version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: tmdb_postgres
    restart: always

    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}

    ports:
      - "5433:5432"

    volumes:
      - tmdb_data:/var/lib/postgresql/data

volumes:
  tmdb_data: